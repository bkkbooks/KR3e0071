body:
  text: 推求師意卷上明汪機撰􅒻本草於知母草果烏梅穿山甲皆言治􅒻然知母性寒入治足陽明獨盛之火使其退就太陽也草果性溫燥治足太陽獨盛之寒使其退就陽明也二味合和則無隂陽交作之變故為君藥常山主寒熱􅒻吐胸中痰結故用為臣甘草和諸藥烏梅去痰檳榔除痰癖破滯氣故用為佐穿山甲以其穴山而居遇水而入則是出隂入陽穿其經絡於榮分以破暑結之邪故用為使若脾胃鬱伏痰涎用之必效苟或無痰止是暑結榮分獨應足太陽血分熱者當發唇瘡此方無效內經諸病惟􅒻最詳語邪則風寒暑濕四氣皆得留著而病􅒻語邪入客處所則有腸胃之别榮衛之舍脊骨之間五藏膜原與入客於藏者淺深不一語其病狀則分寒熱先後語寒熱多寡則因反時而病以應令氣生長收藏之此皆外邪所致也濕在藏者止以風寒中於腎疸􅒻者止以肺素有熱然冬令之寒得中於腎其四藏令氣之邪又寧無入客於所屬藏乎既肺本氣之熱為􅒻則四藏之氣鬱而為熱者又寧不似肺之為􅒻耶舉例可知餘也陳無擇謂內傷七情饑飽房勞皆得鬱而藴積痰涎其病氣與衛氣併則病作蓋內外所傷之邪皆因客在榮氣之舍故􅒻有止發之定期榮氣有舍猶行人之有傳舍也榮衛之氣日行一周歷五藏六府十二經絡界分必有其舍舍與邪合合則隂盛隂盛則陽虛於是隂陽相并而病作其作也不惟脉外之衛虛并入於隂靈樞所謂足陽明與衛俱行者亦虛陽明之氣虛則天真因水谷而充大者亦暫衰所以􅒻作之際禁勿治刺恐傷胃氣與其真也必待隂陽并極而退榮衛天真胃氣繼而復集邪留所客之地然後治之或當其病未作之先迎而奪之先生謂􅒻邪得於四氣之初胃氣弱者即病胃氣強者伏而不動至於再感胃氣重傷其病乃作此為外邪必用汗解虛者先以參术實胃加藥取汗惟足屬隂最難得汗汗出至足乃佳取汗非特麻黃但開鬱通經其邪熱即散為汗矣又云􅒻發於子後午前者陽分受病易愈午後亥前者隂分難愈必分隂陽氣血藥以佐之觀形察色以别之嘗從是法以治形壯色澤者病在氣分則通經開鬱以取汗色稍夭者則補虛取汗挾痰者先實其胃一二日方服劫藥形弱色枯則不取汗亦不可劫補養以通經調之形壯而色紫黑病在血分則開其澀滯色枯者補血調氣此其常也至若取汗而不得汗理血而血不開非更求藥切中病情直造邪所著處安能愈乎一老人􅒻嗽半載兩尺脉數有力色稍枯蓋服四獸飲等劑中焦濕熱下流伏結於腎以致腎火上連於肺故􅒻嗽俱作參术芩連升麻柴胡調中一二日與黃柏丸兩日夜夢交通此腎熱欲解故從前隂精竅而走散無憂也次日􅒻嗽頓止一富家子年壯病􅒻自卯足寒至酉分方熱至寅初乃休一日一夜止蘇一時因思必為入房感寒所致問云九月暴寒夜半有盜急起不著中衣當時足即冷十日後􅒻作蓋足陽明與衝脉合宗筋㑹於氣街入房太甚則足陽明與衝脉之氣皆奪於所用其寒乘虛而入舍於二經二經過脛㑹足跗上於是二經之陽氣益損不能滲榮其經絡故病作卒不得休因用參术大補附子行經加散寒以取汗數日不得汗病如前因思足跗道逺藥力難及再以蒼术川芎桃枝煎湯盛以髙桶扶坐浸足至膝食頃以前所服藥飲之汗出通身病愈先生遇竒症則設規矩旁求曲㑹施行以權消渴太隂司天寒水之勝心火受鬱內熱已甚則當治內熱為急內熱未甚即當散寒解鬱為急如宣明論立方著於諸症條下者具治漏風而渴用牡蠣防風白术先治漏風為急若心移寒於肺為肺消則以心火乘肺傷其氣血為急所移之寒非正當其邪也故用參耆熟苄北五味桑皮麥門枸把先救血氣之衰故不用寒藥泄內熱也若心移熱於肺傳於膈消則以肺熱為急用麥門冬治肺中伏火為君括蔞實知母泄熱為臣甘草北味生芐葛根人參生津液益氣血為佐若心火上炎於肺必由心有事㑹不得其正以致其藏氣血之虛故厥陽之火上逆所以用茯神安心定志養神竹葉麥門冬之凉以安其宅則火有所歸息矣是三條消渴便見河間處方酌量標本緩急輕重之宜臟府切當之藥也喉痛因於相火之微甚微則正治甚則反治撩痰出血三者隨宜而施或於手大指少商出血行氣若腫達於外必外付以藥豫嘗以鵝翎蘸水醋繳咽中摘出其痰蓋酸能收其痰又能消積血若乳蛾甚而不散者以小刀就蛾上出血皆用馬牙硝吹㸃咽喉以退火邪服射干青黛甘桔梔芩惡實大黃之類隨其攸利為方以散上焦之熱外付如生苄韭根伏龍肝皆可用若咽瘡白者多涎赤者多血大率與口瘡同例如薔薇根皮黃柏青黛煎噙細咽先生言理中湯亦可治詳口瘡條下疝一人病後飲水病左丸痛甚灸大敦以摩腰膏摩囊上上抵橫骨灸溫帛覆之痛即止一宿腫亦消豫舊有甘橘積後山行饑甚食橘芋橘動舊積芋復滯氣即時寒熱右丸腫大先服調胃劑一二貼次早注神使氣至下焦覺積動嘔逆吐之復吐後和胃氣疏通經絡而愈腸癰一婦以毒藥去胎後當臍右結塊塊痛甚則寒熱塊與臍髙一寸痛不可按脉洪數謂曰此瘀血流溢於腸外肓膜之間聚結為癰也遂用補氣血行結滯排膿之劑三日决一鋒針膿血大出內如糞狀者臭甚病婦驚怕豫謂氣血生肌則內外之竅自合不旬日而愈肩癰一人肩井後腫痛身熱且嗽其腫按之不堅此乃酒痰流結也遂用南星半夏瓜蔞葛根芩連竹瀝作煎飲之燒葱根熁腫上另用白芥子白礬作小丸用煎藥吞二十丸須臾痰隨嗽出半日約去三四碗而愈凡治病必分其主治之藥先之以經氣在陽明治濕熱石灰柏皮之屬在厥隂治火熱臘荼腦射之屬次從所得之因食積加蘆薈磕傷加韭汁沒藥瘡膿潰而不出加輕粉取之無不愈咳嗽人之陽常有餘隂常不足故金水二藏必保養之使水不竭金不虧則木有制不猖狂矣經曰諸逆衝上皆屬於火原病式曰五志色欲之動皆屬相火水衰火無所畏得以衝逆於肺其水莫能救母之鬼賊則肺之隂愈虧必須瀉火益水以救金可也如薑桂半夏辛溫燥熱之劑皆不宜用然於㵼火雖不比外邪鬱發而為風寒暑濕之至者亦須分四藏所動之本氣各欲安之且火不惟傷肺之隂甚則亦害元陽又必辨其所傷之隂陽孰輕孰重此條止論虛者用參术其於益隂如天麥門冬之屬無有也至若治寒加細辛乾薑之屬亦無有也是皆要者尚且不備况分經之劑乎瘡瘍癮疹疥癬內經有謂汗之則瘡已者謂濕勝皮膚為疥癬者也治當飲以凉肌和血散濕熱怫鬱在皮膚之藥外以殺蟲潤燥解痰涎凝結腠理之藥付之仲景謂瘡不可汗汗之則作痓此熱鬱肌肉血腐為瘡宜解內熱也或飲食之積所致皆不宜汗熱有淺深故也瘍即頭瘡乃火熱上炎當治火於上內使之降外令其散亦付以殺蟲退熱之劑世方皆得以治不足深論酒􅖟鼻酒熱所致乎曰不然不飲者亦病此蓋鼻者肺竅而足陽明俠鼻上至目內眥其位居面之中屬土為呼吸氣息出入之門户氣血之精明者皆上注於面入於其竅故胃中濕熱與中焦熱所化之血上輸於肺隨呼吸之息薰蒸鼻端凝結皮膚遂成紅赤甚則盈面不獨在鼻也豫嘗以凌霄花為末和蜜陀僧唾調付甚妙健忘安神之外猶可論否曰方論雖言怵惕思慮所傷憂欲過損驚恐傷心心傷則健忘也豫嘗思之人生氣禀不同得氣之清則心之知覺者靈得氣之濁則心之知覺者昏心之靈者無有限量雖千百世已往之事一過目則終身記之而不忘心之昏者雖無所傷而目前事亦不能記矣劉河間謂水清明火昏濁故上善若水下愚若火此禀質使然設禀清濁混者則不能耐事煩擾煩擾則失其靈而健忘蓋血與氣人之神也經曰靜則神藏躁則消亡靜乃水之體躁乃火之用故性靜則心存於中動則心亡於外動不已則忘不已忘不已則存於中者幾希故語後便忘不俟終日所以老人多忘蓋由役役擾擾紛紜交錯氣血之隂於斯將竭求其清明有所守而不為事物所亂者百無一人焉由是言之藥固有安心養血之功不若平心易氣養其在己而已設使因痰健忘乃一時之病亦非獨痰也凡心有所寄與諸火熱傷亂其心皆健忘也靈樞謂盛恐傷志志喜忘內經謂血并於下氣并於上亂而喜忘可不各從所由以治之哉癆瘵內經無癆瘵之名而有癆瘵之因凡外感六淫內傷七情其邪展轉乘於五藏遂至大骨枯藁大肉陷下各見所合衰憊之症真藏脉見則有死期二陽之病則為風消息賁三陽為病其傳為索澤疸成為消中大腸移熱於胃胃移熱於膀胱膽則體癢而瘦嘗貴後賤病從內生名曰脫榮嘗富後貧名曰失精暴樂後苦皆傷精氣精氣竭盡形體毁沮離絶菀結憂恐喜怒五藏空虛血氣離守靈樞曰怵惕思慮則傷神神傷則恐懼自失破膕脫肉毛瘁色夭死於冬又諸在膚肉脉筋骨之間者各索所合之本藏不得索於所不勝後世張仲景立虛勞門本於此也巢元方有虛勞有蒸病有注病皆推於此也虛勞者五勞六極七傷是也五勞者志勞思勞憂勞心勞瘦勞六極者氣極血極筋極骨極肌極精極也七傷者曰隂寒曰隂痿曰裏急曰精連曰精少隂下濕曰精滑曰小便苦數臨事不舉又曰大飽傷脾大怒氣逆傷肝強力舉重久坐濕地傷腎形寒飲冷傷肺憂愁思慮傷心風雨寒暑傷形大恐懼不節傷志又五蒸病者骨蒸脉蒸皮蒸肉蒸內蒸遍身熱多又因熱病愈後食牛肉或飲酒或房欲而成諸注候者謂邪氣居住人身之內故名為注此由隂陽失守經絡空虛風寒暑濕勞役之所致也或傷寒傳諸隂不時除瘥而留滯或宿食冷熱不調而流注或乍感生死之氣卒犯鬼物之精皆能成病變狀多端凡此注之為言住也言其連滯停住死又注易傍人也已上虛勞蒸注等候近世方論所列之藥衆矣未有一言以歸其要者蓋人之生氣與形耳氣為陽形為隂偏於陽則熱偏於隂則寒况消萬物莫甚於火夫癆瘵未有形不瘠肉不消也皆由精血不勝氣之熱火當用寒凉以和之益水以濟之耳乃謂形不足須溫之以氣豈知溫乃溫存非溫熱也氣本陽而復得溫則成亢陽矣已涸之精血而加之以溫熱天真何由而生耶又有一等胎生骨細質弱者精血必虧比天癸巳至而隂不能全盛與陽為配及情欲動中或勞役所使則君相二火相扇而起其虧少之隂水莫能制之故內蒸五藏外連四屬如是者以禀賦夭短豈藥所能治哉咳血止從肺出他無可言耶曰肺不獨咳血而亦唾血蓋肺主氣氣逆為咳腎主水水化液為唾腎脉上入肺循喉嚨挾舌本其支者從肺出絡心注胸中故二藏相連病則俱病於是皆有咳唾血也亦有可分别者涎唾中有少血散漫者此腎從相火炎上之血也若血如紅縷在痰中咳而出者此肺絡受熱傷之血也其病難已若咳白血必死白血淺紅色似肉似肺也然肝亦唾血肝藏血肺藏氣肝血不藏亂氣自兩脅逆上唾而出之內經有血枯症先唾血為氣竭傷肝也又有咯血咯與唾少異唾出於氣上無所阻咯出於痰氣鬱喉嚨之下上不得出咯而乃出求病所屬之藏咯唾同出於腎也余嘗治三人不咳唾而血見口中從齒縫舌下來者每用滋腎水瀉相火治之不旬日而愈又治一人因憂病咳唾血面黎黑色藥之不效曰此必得喜可解其兄求一足衣食地處之於是大喜即時色退不藥而瘳經曰治病必求其本又曰無失氣宜是知藥之治病必得其病之氣宜苟不察其得病之情雖藥亦不愈也肺痿出金匱要略謂熱在上焦因咳為肺痿痿得之或從汗出或從嘔吐或從消渴小便利數或從便難或被快藥下利重亡津液故寸口脉數而咳口中反有濁唾涎沫原其意從內經痿條推廣在藏氣不得布榮衛行津液反怫鬱為熱聚結涎沫濁唾而後咳也故附方或用炙甘草湯或用生薑人參大棗湯主之所治大意似之矣至若又謂肺痿吐涎沫而不咳其人不渴必遺尿小便數以上虛不能制下故也此為肺冷吐多涎唾甘草生薑湯以溫之若服湯已渴者屬消渴則此所治便與前條上焦熱者不同矣上焦熱則怫鬱而肺之𤣥府燥澀氣不利則咳津不布則渴此云肺中冷者非形寒飲冷之邪在其中由上焦無陽故曰冷陽氣不足則不成熱不熱則不咳亦不渴惟氣虛不能制約其水道之行也肺與腎連藏肺虛則腎亦虛故水入咽直達於腎腎亦不以水精四布於五藏而徑出於溺矣痿血氣劣弱力不任用而名也故內經痿論叙其皮肉筋骨痿弱於四屬之外者然而有諸外必本諸內至若五藏精神氣血性情魂魄司動靜之機於內者而經亦嘗舉其端所謂腎風而不能食善驚驚已心氣痿者死又太隂司天濕氣下臨腎氣上從隂痿氣太衰而不起此非各從其所司之內症者歟今仲景更明肺藏所生氣之虛實者又如此脾肝二藏雖無明文觀此例則可知矣六府九竅皆然是故劉河間論氣血者人之神若氣血或鬱結或衰虛不能宣通則神無所用而不遂其機故劣弱也當隨其虛實補瀉之使氣血宣行則神自清利而應機能為用矣怖內經無有始於金匱要略奔豚條有驚怖繼云驚恐可見驚怖即驚恐怖懼也恐亦懼也凡連稱驚恐者以一隂一陽對待而言如喜怒並稱者喜出於心心居在陽怒出於肝肝居在隂志意並稱者志是靜而不移意是動而不定靜隂也動陽也驚恐並稱者驚因觸於外事內動其心心動則神搖恐因惑於外事內慊而精却內經謂驚則心無所倚神無所歸慮無所定故氣亂矣恐則精却却則上焦閉閉則氣外外則下焦脹故氣不行矣又謂嘗貴後賤嘗富後貧悲憂內結至於脫榮失精病深無氣則灑然而驚此類皆病從外事所動內之心神者也若夫在身之隂陽盛衰而致其驚恐者則驚是火熱躁動其心心動則神亂神用無方故驚之變狀亦不一為驚駭為驚妄為驚狂為驚悸等病恐則熱傷其腎腎傷則精虛虛則志不足志本一定而不移故恐亦無他狀內經有驚病之邪有火熱二淫司天在泉勝復之氣有各經熱病所致有三陽積并有氣并於陽皆為諸驚等病故病機統而言曰諸病驚駭皆屬於火也於恐病之邪者有精氣并於腎則恐有血不足則恐有少陽入隂隂陽相搏則恐有胃熱腎氣微弱則恐闕腎是動者則恐然於肝之驚恐互作者以其臟氣屬陽居隂納血藏魂魂不安則神動神動則驚血不足則志慊志慊則恐故二者肝藏兼而有之似此之類於火熱二淫并濕屬感邪之外其餘驚恐皆因氣之隂陽所動而內生也驚恐二病與內外所因治法同乎異乎曰驚則安其神恐則定其志治當分隂陽也心為離火內隂而外陽腎為坎水內陽而外隂內者是主外者是用又主內者五神外用者五氣是故心以神為主陽為用腎以志為主隂為用陽則氣也火也隂則精也水也及乎水火既濟全在隂精上承以安其神陽氣下藏以定其志不然則神搖不安於內陽氣散於外志感於中隂精走於下既有二藏水火之分治法安得無異所以驚者必先安其神然後散之則氣可斂氣斂則陽道行矣恐者必先定其志然後走之則精可固精固則隂氣用矣於藥而有二藏君臣佐使之殊用內外所感者亦少異㑹外事驚者張子和謂驚者平之平有二義一云平常也使病者時時聞之習熟自然不驚一云此固良法不若使其平心易氣以先之而後藥之也吾謂內氣動其神者則不可用是法惟當以藥平其隂陽之盛衰而後神可安志可定矣痓仲景謂太陽病發熱無汗反惡寒名曰剛痓者為中風發熱重感於寒而得之此內經所謂赫䂀之紀土羽為痓其義一也如中風淫之熱與火運以熱無少異其重感於寒亦與土羽之寒同是外鬱熱因鬱則愈甚甚則熱兼燥化而無汗氣血不得宣通大小筋俱受熱害而強直故曰剛痓所謂太陽病發熱汗出不惡寒名曰柔痓者為太陽發熱重感於濕而得之此內經所謂諸痓項強皆屬於濕又謂因於濕首如褁濕熱不穰大筋緛短小筋弛張緛短為拘弛張為痿肝移熱於腎傳為柔痓注云柔謂筋柔而無力強謂骨強而不隨三者之義與仲景所言重感於濕為柔痓者豈不同是小筋得濕則痿弛而無力者乎其搖頭發熱頭項強急腰背反張瘛瘲口噤與剛痓形狀等者豈不同是大筋受熱則拘攣強直者乎後代乃以無汗為表實有汗為表虛不思濕勝者多汗乃以汗為表虛而用姜附溫熱等劑寧不重增大筋之熱歟溫病方中有治法者三以人中黃療時行熱毒為主蒼术香附散結解鬱為臣芩連降火人參補虛桔梗防風利氣行經為佐熱毒鬱結則內外氣液不通成燥大黃苦寒而能蕩滌燥熱滑石性滑味淡將以利竅解結通氣液以潤燥二者一隂一陽故用之為使此三治法非特通治諸溫也內經冬傷於寒春必病溫與冬不藏精病溫者有虛實之異有四時不正勝氣鬱之者有君相二火加臨者即分君客之殊有五運六氣當遷正值所勝抑之不得升降又當辨其所發之氣以治豈守三法俱用以治溫乎先生曰凡亢陽霖淫暴風氷雹非常之變必記以驗發於何時以為治源也手心熱手心者心之營名勞宫手少隂脉入掌中故心所生病掌中熱痛心主手厥隂包絡脉入掌中是動則病手心熱所生病者煩心掌中熱是知手心熱者皆二經之火為病百端豈一症一方可言哉原其方旨必是當時為憂慮過節津液不布停聚成痰濕鬱伏熱心火不得發越故用此方因集於此發熱隂血虛而熱者叙之太略隂陽之在人身猶權衡之不可髙下陽盛則熱隂盛則寒况天地之氣陽大而隂小人禀之以生故陽易勝隂易乏隂不敵陽則熱發於內而徹於外故百病皆生於隂陽之勝負也陽為強盛或客邪入害其正則皆隨其勝負處發為熱病故內經諸篇屢書不一仲景明六經五藏之治法河間明水火隂陽之微旨東垣有內傷治火分經之藥今先生參用三家之說嘗謂相火易起遇五性為物所感不能不動動則厥陽之五火從而相扇是相火起於妄妄則煎熬真隂隂虛則病隂絶則死此水火隂陽為病之源先生治血虛發熱而血亦分隂陽若血之隂不足如芎歸辛溫亦在不用若血之陽不足雖姜桂辛熱而亦用之與瀉火之法有正治有從治皆在臨機應變其不執方也如此飲酒發熱蓋酒大熱有毒况人身陽氣本熱得酒則熱愈熾愈剛隂氣必破散陽氣亦消亡而死矣豈止難治而已設身之隂氣因酒而耗自熱不甚惟酒熱而病隂氣之散有未絶則猶有可治之理姑書一二以驗之一人每晨飲燒酒數杯後終日飲常酒至五六月大發熱醫用水攤心腹消復增之內飲以藥三日乃愈一人年二十於四月病發熱脉浮沉皆有不足意其間得洪數一種隨熱進退不時知非傷寒也因問必是過飲酒毒在內今為房勞氣血虛乏而病作耶曰正月間每晨飲燒酒喫犬肉近一月矣豫得病情遂用𥙷氣血藥加乾葛以解酒毒服一貼微汗反解怠熱如故因思是病氣血皆虛不禁葛根之散必得枸距子方可解也偶有一小枝在書册中幸不腐爛而乾加前藥內煎服一貼而愈吁孫真人云醫者意也但患病情察之未到藥味思之未得若病藥兩得何患不痊腳氣一人兩足酸重不任行動發則腫痛一日在不發中診脉三部皆大搏手如葱管無力身半已上肥盛豫以其膏粱妾御嗜欲無窮精血皆不足濕熱太盛因用益精血於其下清熱濕於其上二方與之或言腳氣無補法故不肯服三月後痛作一醫用南法治不效一醫用北法瀉之即死於溺器上吁不識病之虛實執方誤人多矣夢遺經曰腎屬水受五藏六府之精而藏之又曰主蟄封藏之本精之處也又曰隂陽之要陽密乃固故陽強不能密隂氣乃絶隂平陽祕精神乃治隂陽離决精氣乃絶又曰隂陽總宗筋之㑹㑹於氣街靈樞曰厥氣客於隂器則夢接內蓋隂器者宗筋之所聚也而足太隂陽明少隂厥隂之筋皆結聚於隂器與衝任督三脉之所㑹然厥隂主筋故諸筋皆通於厥隂腎為隂主藏精肝為陽主踈泄隂器乃泄精之竅故腎之隂虛則精不藏肝之陽強則氣不固若隂客於其竅與所強之陽相感則精脫出而成夢陽強者非藏真之陽強乃肝藏所寄之相火強耳火盛不已反有以消其藏之真陽者肝藏魂藏真之陽虛則遊魂為變變則為夢與肝虛多夢亡人無異然病之初起亦有不在腎肝而在心肺脾胃之不足者然必傳於腎肝而致精之走也有自然相傳之理焉宗筋者上絡胸腹夾臍下合橫骨故內經謂其總宗筋之㑹㑹於氣街主束骨而利機關也五藏俱有火相火寄於肝者善者則發生惡者為害甚於他火故平人肝氣剛勇充於筋而為罷極之本也其隂器既宗筋之所聚乃強於作用皆相火充其力也若遇接內得隂氣與合則三焦內外之火翕然下從火從而動則百體𤣥府悉開其資生之精盡趍㑹於隂器以躍出焉豈腎之所藏者而已所謂厥氣客於隂器厥氣亦身中隂分所逆之氣與接內之氣同是隂類故夢猶接內之脫精也夢則真陽虛未免形體衰憊其氣難復不比平人接內一二時間氣便可復也曰治法何如曰病從他藏起者則以初感病者為本腎肝聚病之處為標由肝腎自得者獨治肝腎可也由隂陽離决水火不交通者則既濟之隂陽不相抱負者則因而和之陽虛補氣隂虛補血陽強者瀉火火有正治反治從少從多隨其攸利奈何世人不辨隂陽虛實惟務溫之熱之於內灸之於外直至隂水耗竭壯火獨炎枯脂消肉骨立筋痿不可復救矣余惟從經旨以治多驗一人二十餘嵗夜讀書至四鼓猶未巳遂發此病卧間莖但著被與腿便夢精脫懸空則否飲食日减倦怠少氣余以用心太過二火俱起夜不得眠血不歸肝則腎水不足火乘隂虛入客下焦鼓其精房則精不得聚藏而走失矣因玉莖著物猶厥氣客之故作接內之夢於是上則補心安神中則調理脾胃升舉其隂下則益精生隂固陽不三月愈一老人六十嵗患瘧而嗽多服四獸飲積成濕熱乘於下焦幾致危困余疹尺脉數而有力與補中益氣加凉劑三日與黃柏丸次早尺數頓減因問有夜夢否曰然幸不泄爾余謂年老精衰固無以泄蓋以大熱結於精房得泄火益隂之藥其火散走於隂氣之竅病可减矣再服二日又夢其瘧嗽全愈一人每夜有夢余連疹二日脉觀其動靜終不舉頭但俯視不正必隂邪相著扣之不言其狀遍問隨其出入之僕乃言至廟見侍女以手撫摩其身久之不三日遂病令法師入廟毁其像小腹中泥土皆濕其病遂安此則鬼魅相感耳嘗觀仲景治下焦真陽與精血兩虛少腹弦急脉芤動微緊男子失精女子夢交通者用桂枝龍骨之屬溫之固之若陽浮上而不降悸衄手足煩咽乾口燥隂獨居內為裏急腹痛夢失精者以小建中湯和之皆可取以為法也淋膀胱主水水入於胞為溲便若飲食不節喜怒不時虛實不調則藏不和致腎虛膀胱有熱腎虛則小便數膀胱熱則水澀而數澀則淋瀝不宣故曰淋小腹弦急痛引於臍又須分石膏血勞氣冷其石淋如沙石膏淋肥膩若脂膏又名肉淋血淋心主血氣通小腸熱甚則搏於血脉血得熱則流行於胞中與溲俱下勞淋勞倦則發氣淋胞內氣脹小腹堅滿出少喜數尿有餘瀝冷淋冷氣客於下焦邪正交爭滿於胞內水道不宣先寒顫然後便溺成淋可謂得其病情矣內經病因又不止此若太隂作初氣病中熱脹脾受積濕之氣小便黃赤甚則淋少陽作二氣風火鬱於上而熱甚病淋蓋五藏六府十二經脉氣皆相通移是故足太陽主表上行則統主諸陽之氣下行則入膀胱又肺者通調水道下輸膀胱脾胃消化水谷或在表在上在中凡有熱則水液皆熱轉輸下之然後膀胱得之而熱矣且小腸是心之府主熱者也其水必自小腸滲入胞中諸熱應於心者其小腸必熱胞受其熱經謂胞移熱於膀胱則癃溺血是也是知初起之熱邪不一皆得傳於膀胱而成淋故淋必先治其本若止治胞中之熱未為善也夫淋必由熱甚生濕濕生則水液渾濁凝結為淋又有服金石入房太甚敗精流於胞中及飲食痰積滲入者皆能成淋先生治小兒在胎禀父母金石餘毒之氣病淋十五年治以紫雪而愈凡治病必求其本也小便不通治以吐法何也曰取其氣化而已經曰三焦者决瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣故上中下三焦之氣有一不化則不得如决瀆之水而出矣豈獨下焦膀胱氣塞而已上焦肺者主行榮衛通調水道下輸膀胱而腎又上連肺豈非小便從上焦之氣化者乎仲景謂胃氣行則小便宣通內經謂脾病則九竅不通小便不利者其病一也由是三焦所傷之邪不一氣之變化無窮故當隨處治邪行水大要在乎隂陽無相偏負然後氣得以化若方盛衰論曰至隂虛天氣絶至陽盛地氣不足夫腎肝在下地道也心肺在上天道也脾胃居中氣交之分也故天之陽絶而不下交於地者尚且白露不下况人同乎天其上之陽不下交於隂則下之隂虛在上之陽盛不務其德而乘之致腎氣之不化必瀉其陽而舉之則隂可得而平也若此條所叙之症皆用吐法蓋因氣道閉塞升降不前者而用耳其他衆法何嘗捨之而獨施是哉先生嘗曰吾以吐法通小便譬如滴水之器開其上竅則下竅水自出焉一婦年五十患小便澀治以八正散等劑小腸脹急不通身如芒刺余以所感霖淫雨濕邪尚在表因用蒼术為君附子佐之發表一服即汗小便隨通一人年八旬小便短澀分利太過致涓滴不出蓋飲食過傷其胃氣陷於下焦用補中益氣湯一服即通泄瀉多類得於六淫五邪飲食所傷之外復有雜合之邪似難執方而治先生治暴氣脫而虛頓泄不知人口眼俱閉呼吸甚微殆欲死者急灸氣海飲人參膏十餘斤而愈治隂虛而腎不能司禁固之權者峻補其腎治積痰在肺致其所合大腸之氣不固者湧出上焦之痰則肺氣下降而大腸之虛自復治憂思太過脾氣結而不能升舉陷入下焦而泄者開其鬱結補其脾胃使谷氣升舉也凡此不可枚舉因問先生治病何其神也先生曰無他員機活法具在內經熟之自得矣退讀內經三年乃知先生於泄利症凡內外之邪有傷生化之用則隂陽失其居處之常藏府失其所司之政以致腸胃傳化之職不修故泄利也膈噎之病得之七情六淫遂有火熱炎上之化多升少降津液不布積而為痰為飲為嘔吐必須外避六淫內節七情飲食自養滋血生津以潤腸胃則金無畏火之炎腎有生水之漸氣清血和則脾健運而食消磨傳送遞行矣治者例用辛香燥熱痰飲被劫時暫得快七情飲食不節其症復作前藥再行積成其熱血液俱耗胃脘乾槁大便祕少推求師意卷上
