body:
  text: 推求師意醫家類提要臣等謹案推求師意二卷明戴原禮撰原禮即校補朱震亨金匱鈎元者也是編本震亨未竟之意推求闡發筆之於書世無傳本嘉靖中祁門汪機睹其本於歙縣始録之以歸機門人陳桷校而刋之其名亦機所題也考李濓醫史有原禮補傳稱平生著述不多見僅有訂正丹溪先生金匱鈎元三卷間以己意附於後又有證治要訣證治類方類症用藥總若干卷皆櫽括丹溪之書而為之然則此二卷者其三書中之一歟原禮本震亨髙弟能得師傳故所録皆秘㫖㣲言非耳剽目竊者可比震亨以補隂為主世言直補真水者實由此開其端書中議論大率皆本此意然俗醫不善學震亨者往往矯枉過甚反致以寒凉殺人此書獨能委曲圓融俾學者得其意而不滋流弊亦可謂有功震亨者矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀推求師意原序夫師者指引之功也必須學者隨事精察真積力乆而於師之引而不發者始得見其躍如者焉苟或不然師者未必能引進學者未必能起予二者須失之也夫何益之有哉故曰不憤不啓不悱不發舉一隅不以三隅反則不復也其斯之謂歟予於歙之名家獲覩是編觀其中之所語皆本丹溪先生之意門人弟子推求其意而發其所未發者此所謂引而不發而得其躍如者焉予深喜之遂録以歸後休之率口項君恬以疾來就予治予邑石墅陳子桷以醫而過予舘因出以示之二人者心意相符一則曰是可以益於吾疾也一則曰是可以補於吾醫也乃相告於予曰吾二人共梓之以垂不朽何如予曰醫乃仁術也筆之於書欲天下同歸於仁也今若刻布以廣其傳則天下病者有所益而天下醫者有所補其仁惠及於天下大矣豈特二子然哉此予之所深嘉也又能善推予之所欲推矣因題之曰推求師意故僭序之以志喜焉時嘉靖甲午七月五日新安汪機省之序
